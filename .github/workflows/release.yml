name: Release Obsidian Plugin
on:
  push:
    tags:
      - "*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get Version
        id: version
        run: |
          echo "tag=$(git describe --abbrev=0)" >> $GITHUB_OUTPUT
      - name: Build
        id: build
        run: |
          npm install
          npm run release
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            dist/main.js
            manifest.json
            styles.css
